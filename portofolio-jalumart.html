    <script>
        (function () {
            var shots = Array.prototype.slice.call(document.querySelectorAll('[data-shot]'));
            if (!shots.length) return;

            var lb       = document.getElementById('lightbox');
            var lbImage  = lb.querySelector('.lb-image');
            var lbCap    = lb.querySelector('.lb-caption');
            var lbCount  = lb.querySelector('.lb-count');
            var btnClose = lb.querySelector('.lb-close');
            var btnPrev  = lb.querySelector('.lb-prev');
            var btnNext  = lb.querySelector('.lb-next');
            var current  = 0;
            var lastFocus = null;

            function show(i) {
                current = (i + shots.length) % shots.length;
                var fig = shots[current];
                lbImage.src = fig.getAttribute('data-src');
                lbImage.alt = fig.getAttribute('data-caption') || '';
                lbCap.textContent = fig.getAttribute('data-caption') || '';
                lbCount.textContent = (current + 1) + ' / ' + shots.length;
            }

            function open(i) {
                lastFocus = document.activeElement;
                show(i);
                lb.classList.add('is-open');
                lb.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
                btnNext.focus();
            }

            function close() {
                lb.classList.remove('is-open');
                lb.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                lbImage.src = '';
                if (lastFocus) lastFocus.focus();
            }

            shots.forEach(function (fig, i) {
                fig.setAttribute('tabindex', '0');
                fig.setAttribute('role', 'button');
                fig.addEventListener('click', function () { open(i); });
                fig.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(i); }
                });
            });

            btnPrev.addEventListener('click', function () { show(current - 1); });
            btnNext.addEventListener('click', function () { show(current + 1); });
            btnClose.addEventListener('click', close);
            lb.addEventListener('click', function (e) { if (e.target === lb) close(); });

            document.addEventListener('keydown', function (e) {
                if (!lb.classList.contains('is-open')) return;
                if (e.key === 'Escape') close();
                else if (e.key === 'ArrowLeft') show(current - 1);
                else if (e.key === 'ArrowRight') show(current + 1);
            });
        })();
    </script>
